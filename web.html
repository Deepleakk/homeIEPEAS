<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran - IEPEAS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-container">
        <div class="menu-toggle" id="menuToggle">☰</div>
        <div class="menu-dropdown" id="menuDropdown">
            <div class="menu-close" id="menuClose">✕</div>
            <a href="home.html">🏠 Home</a><a href="web.html">📝 Daftar</a><a href="linktree.html">🔗 Linktree</a>
        </div>
    </div>
    <div class="glass-card">
        <h1 style="margin-bottom:10px;">🌸 FORM SELEKSI 🌸</h1>
        <p style="text-align:center; margin-bottom:30px;">Isilah form dengan jujur.</p>
        <form id="registerForm">
            <div class="form-group"><label>Nama asli :</label><input type="text" id="nama_asli" required></div>
            <div class="form-group"><label>Umur :</label><input type="number" id="umur" required></div>
            <div class="form-group"><label>Tujuan Bergabung :</label><textarea id="tujuan" rows="3" required></textarea></div>
            <button type="submit">📱 Kirim Jawaban ke WhatsApp 📱</button>
        </form>
        <div class="credit">©IEPEAS</div>
    </div>
    <script src="rain.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let nama = document.getElementById('nama_asli').value;
            let pesan = `*FORM SELEKSI*\nNama: ${nama}\nTujuan: ${document.getElementById('tujuan').value}`;
            window.open(`https://wa.me/6289515560507?text=${encodeURIComponent(pesan)}`);
        });
        document.getElementById('menuToggle').onclick = () => document.getElementById('menuDropdown').classList.add('show');
        document.getElementById('menuClose').onclick = () => document.getElementById('menuDropdown').classList.remove('show');
    </script>
</body>
</html>
