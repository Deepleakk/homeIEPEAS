<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - IEPEAS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-container">
        <div class="menu-toggle" id="menuToggle">☰</div>
        <div class="menu-dropdown" id="menuDropdown">
            <div class="menu-close" id="menuClose">✕</div>
            <a href="home.html">🏠 Home</a><a href="web.html">📝 Daftar</a><a href="linktree.html">🔗 Linktree</a>
        </div>
    </div>
    <div class="glass-card">
        <h1>🌸 FORM SELEKSI 🌸</h1>
        <form id="registerForm">
            <input type="text" id="nama_asli" placeholder="Nama Asli" required>
            <input type="number" id="umur" placeholder="Umur" required>
            <textarea id="tujuan" placeholder="Alasan masuk marga..." required></textarea>
            <button type="submit">📱 Kirim ke WhatsApp</button>
        </form>
    </div>
    <script src="rain.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let nama = document.getElementById('nama_asli').value;
            let pesan = `Halo Admin, saya ${nama} ingin daftar IEPEAS.`;
            window.open(`https://wa.me/6289515560507?text=${encodeURIComponent(pesan)}`, '_blank');
        });
        // Script menu sama kayak home
        document.getElementById('menuToggle').onclick = () => document.getElementById('menuDropdown').classList.add('show');
        document.getElementById('menuClose').onclick = () => document.getElementById('menuDropdown').classList.remove('show');
    </script>
</body>
</html>
