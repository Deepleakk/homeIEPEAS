<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronomi - IEPEAS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 40%, #1e293b 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            color: #e2e8f0;
        }
        .menu-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .menu-toggle {
            font-size: 32px;
            cursor: pointer;
            background: rgba(30,41,59,0.8);
            backdrop-filter: blur(4px);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
            border: 1px solid rgba(59,130,246,0.4);
        }
        .menu-toggle:hover {
            background: #3b82f6;
            color: white;
        }
        .menu-dropdown {
            position: absolute;
            top: 55px;
            left: 0;
            background: rgba(15,25,45,0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 10px 0;
            min-width: 150px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            border: 1px solid rgba(59,130,246,0.4);
        }
        .menu-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .menu-dropdown a {
            display: block;
            padding: 10px 20px;
            color: #cbd5e6;
            text-decoration: none;
            transition: 0.2s;
            font-size: 1rem;
        }
        .menu-dropdown a:hover {
            background: #3b82f6;
            color: white;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.8;
        }
        .submenu {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .submenu button {
            background: rgba(30,41,59,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(59,130,246,0.4);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .submenu button:hover {
            background: #3b82f6;
            transform: scale(1.02);
        }
        .content-area {
            background: rgba(30,41,59,0.4);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 30px;
            min-height: 300px;
            line-height: 1.6;
        }
        .fact-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .loading, .error {
            text-align: center;
            padding: 40px;
            color: #facc15;
        }
        .credit {
            text-align: center;
            font-size: 8px;
            opacity: 0.5;
            margin-top: 60px;
        }
        @media (max-width: 650px) {
            .header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="menu-toggle" id="menuToggle">☰</div>
        <div class="menu-dropdown" id="menuDropdown">
            <a href="home.html">🏠 Home</a>
            <a href="web.html">📝 Daftar</a>
            <a href="linktree.html">🔗 Linktree</a>
            <a href="fun-facts.html">💡 Galeri Pengetahuan</a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🌌 Pengetahuan Astronomi</h1>
            <p>Pilih topik di bawah (otomatis terdeteksi dari folder)</p>
        </div>

        <div id="submenuContainer" class="submenu">
            <div class="loading">📡 Memindai folder astronomi...</div>
        </div>
        <div id="contentArea" class="content-area">
            <p style="opacity:0.7; text-align:center;">✨ Pilih topik di atas ✨</p>
        </div>
        <div class="credit">©IEPEAS</div>
    </div>

    <script>
        const submenuDiv = document.getElementById('submenuContainer');
        const contentDiv = document.getElementById('contentArea');

        // Mendapatkan username dan repo dari URL halaman saat ini (karena di GitHub Pages)
        function getRepoInfo() {
            const path = window.location.pathname; // misal /pendaftaran-EASIEP/astro.html
            const parts = path.split('/');
            // GitHub Pages format: /username/repo/...
            if (parts.length >= 3) {
                return { username: parts[1], repo: parts[2] };
            }
            // fallback hardcode (ganti sesuai milik master)
            return { username: 'Deepleakk', repo: 'EASIEP' };
        }

        async function scanFolder() {
            const { username, repo } = getRepoInfo();
            const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/information/astro`;
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`Gagal mengakses folder: ${response.status}`);
                }
                const files = await response.json();
                // Filter hanya file .txt
                const txtFiles = files.filter(file => file.name.endsWith('.txt'));
                if (txtFiles.length === 0) {
                    submenuDiv.innerHTML = '<div class="error">⚠️ Tidak ada file .txt di folder information/astro/</div>';
                    return;
                }
                // Ekstrak nama topik (hilangkan ekstensi .txt)
                const topics = txtFiles.map(file => file.name.replace(/\.txt$/, ''));
                // Buat tombol
                submenuDiv.innerHTML = '';
                topics.forEach(topic => {
                    const btn = document.createElement('button');
                    btn.textContent = topic.replace(/-/g, ' '); // ganti - jadi spasi biar rapi
                    btn.addEventListener('click', () => loadTopicContent(topic));
                    submenuDiv.appendChild(btn);
                });
                // Load topik pertama otomatis
                loadTopicContent(topics[0]);
            } catch (error) {
                console.error(error);
                submenuDiv.innerHTML = `<div class="error">❌ Gagal scan folder. Pastikan repo publik dan folder information/astro ada. Detail: ${error.message}</div>`;
            }
        }

        async function loadTopicContent(topic) {
            contentDiv.innerHTML = '<div class="loading">✨ Memuat fakta...</div>';
            const rawUrl = `https://raw.githubusercontent.com/${getRepoInfo().username}/${getRepoInfo().repo}/main/information/astro/${topic}.txt`;
            try {
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error(`File ${topic}.txt tidak ditemukan`);
                const text = await response.text();
                const lines = text.split(/\r?\n/).filter(line => line.trim().length > 0);
                if (lines.length === 0) {
                    contentDiv.innerHTML = '<div class="error">⚠️ File kosong.</div>';
                    return;
                }
                let html = '';
                lines.forEach(line => {
                    html += `<div class="fact-item">✨ ${line}</div>`;
                });
                contentDiv.innerHTML = html;
            } catch (error) {
                contentDiv.innerHTML = `<div class="error">❌ Gagal memuat ${topic}.txt. Pastikan file ada di folder information/astro/</div>`;
            }
        }

        scanFolder();

        // Menu dropdown
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });
        document.addEventListener('click', function(event) {
            if (!menuToggle.contains(event.target) && !menuDropdown.contains(event.target)) {
                menuDropdown.classList.remove('show');
            }
        });
    </script>
</body>
</html>
