<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YT Music v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #000; color: white; -webkit-tap-highlight-color: transparent; }
        input[type="range"] { accent-color: #f00; cursor: pointer; }
        .active-tab { color: white; border-bottom: 2px solid white; }
        ::-webkit-scrollbar { width: 0px; }
        .persistent-player { box-shadow: 0 -4px 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-24">

    <header class="sticky top-0 z-40 bg-black/95 backdrop-blur-md p-4 border-b border-zinc-900">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center">
                <svg width="18" height="18" fill="white" viewBox="0 0 256 256"><path d="M240,128a15.89,15.89,0,0,1-8.16,13.93l-176,101A15.91,15.91,0,0,1,32,229V27a15.91,15.91,0,0,1,23.84-13.93l176,101A15.89,15.89,0,0,1,240,128Z"></path></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tighter">Music App</h1>
        </div>
        <div class="flex gap-2">
            <input type="text" id="search-input" placeholder="Cari lagu..." class="flex-1 bg-zinc-900 border-none rounded-lg px-4 py-2 text-sm focus:ring-1 focus:ring-zinc-600 outline-none">
            <button onclick="searchMusic()" class="bg-zinc-800 px-5 py-2 rounded-lg text-sm font-bold active:scale-95 transition">Cari</button>
        </div>
    </header>

    <nav class="flex justify-around bg-black border-b border-zinc-900 text-zinc-500 font-bold text-[10px] uppercase tracking-widest">
        <button id="tab-online" onclick="switchTab('online')" class="py-4 px-6 active-tab">Beranda</button>
        <button id="tab-offline" onclick="switchTab('offline')" class="py-4 px-6">Offline</button>
    </nav>

    <main id="list-container" class="flex-1 p-4 space-y-2"></main>

    <footer id="player-bar" class="fixed bottom-0 left-0 right-0 z-50 bg-zinc-950 border-t border-zinc-900 p-3 persistent-player hidden transition-all duration-300" onclick="openPlayerModal()">
        <div class="absolute top-0 left-0 h-0.5 bg-red-600 transition-all duration-150" id="mini-progress"></div>
        <div class="flex items-center gap-3">
            <img id="cover-art" src="" class="w-12 h-12 rounded bg-zinc-800 object-cover">
            <div class="flex-1 min-w-0">
                <h4 id="song-title" class="text-sm font-bold truncate">Judul Lagu</h4>
                <p id="artist-name" class="text-xs text-zinc-500 truncate">Artis</p>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="downloadSong(event)" class="p-2 text-zinc-400"><svg width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0Zm-101.66,5.66a8,8,0,0,0,11.32,0l40-40a8,8,0,0,0-11.32-11.32L136,124.69V40a8,8,0,0,0-16,0v84.69L93.66,98.34a8,8,0,0,0-11.32,11.32Z"></path></svg></button>
                <button onclick="togglePlay(event)" id="mini-play-btn" class="p-2"><svg id="mini-play-icon" width="30" height="30" fill="currentColor" viewBox="0 0 256 256"><path d="M240,128a15.89,15.89,0,0,1-8.16,13.93l-176,101A15.91,15.91,0,0,1,32,229V27a15.91,15.91,0,0,1,23.84-13.93l176,101A15.89,15.89,0,0,1,240,128Z"></path></svg></button>
            </div>
        </div>
    </footer>

    <div id="player-modal" class="fixed inset-0 z-[60] bg-black p-8 flex flex-col translate-y-full transition-transform duration-500 hidden">
        <button onclick="closePlayerModal()" class="mb-4 text-zinc-500 self-start"><svg width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80A8,8,0,0,1,53.66,90.34L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"></path></svg></button>
        <div class="flex-1 flex flex-col items-center justify-center text-center">
            <img id="modal-cover" src="" class="w-full aspect-square rounded-xl shadow-2xl mb-10 object-cover">
            <h2 id="modal-title" class="text-2xl font-bold mb-2 truncate w-full px-4">Judul Lagu</h2>
            <p id="modal-artist" class="text-zinc-500 mb-8">Nama Artis</p>
            <div class="w-full mb-8">
                <input type="range" id="modal-seek" class="w-full h-1 bg-zinc-800 rounded-full appearance-none mb-2" value="0">
                <div class="flex justify-between text-[10px] font-mono text-zinc-600"><span id="cur-time">0:00</span><span id="dur-time">0:00</span></div>
            </div>
            <div class="flex items-center gap-10">
                <button onclick="prevSong(event)"><svg width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M208,40V216a8,8,0,0,1-13.66,5.66L112,139.31V216a8,8,0,0,1-13.66,5.66l-80-80a8,8,0,0,1,0-11.32l80-80A8,8,0,0,1,112,56v76.69l82.34-82.35A8,8,0,0,1,208,40Z"></path></svg></button>
                <button onclick="togglePlay(event)" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center"><svg id="modal-play-icon" width="36" height="36" fill="currentColor" viewBox="0 0 256 256"><path d="M240,128a15.89,15.89,0,0,1-8.16,13.93l-176,101A15.91,15.91,0,0,1,32,229V27a15.91,15.91,0,0,1,23.84-13.93l176,101A15.89,15.89,0,0,1,240,128Z"></path></svg></button>
                <button onclick="nextSong(event)"><svg width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M208,40V216a8,8,0,0,1-16,0V139.31L109.66,221.66A8,8,0,0,1,96,216V139.31L21.66,213.66A8,8,0,0,1,8,208V48a8,8,0,0,1,13.66-5.66L96,116.69V40a8,8,0,0,1,16,0v76.69l82.34-82.35A8,8,0,0,1,208,40Z"></path></svg></button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const db = new Dexie("MusicDB");
        db.version(1).stores({ songs: "id, title, artist, cover, blob" });

        const audio = document.getElementById('audio-player');
        // DAFTAR INSTANCE LEBIH BANYAK (ANTI-ERROR)
        const instances = [
            'https://api-piped.mha.fi',
            'https://pipedapi.drgns.space',
            'https://pipedapi.astreapp.ca',
            'https://pipedapi.kavin.rocks',
            'https://pipedapi.rivo.gg',
            'https://pipedapi.synced.cloud'
        ];
        let currentInstance = instances[0];
        let currentPlaylist = [];
        let currentIndex = 0;
        let currentTab = 'online';

        // Fungsi Cari yang Lebih Bandel
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            switchTab('online');
            document.getElementById('list-container').innerHTML = "<p class='text-center py-10 text-zinc-700 animate-pulse'>Menghubungi server...</p>";

            for (let base of instances) {
                try {
                    const res = await fetch(`${base}/search?q=${encodeURIComponent(query)}&filter=music_songs`, { signal: AbortSignal.timeout(5000) });
                    if (!res.ok) continue;
                    const data = await res.json();
                    if(data.streams && data.streams.length > 0) {
                        currentPlaylist = data.streams;
                        currentInstance = base;
                        renderList(currentPlaylist);
                        return;
                    }
                } catch (e) { console.log(`Gagal di ${base}, nyoba instance lain...`); }
            }
            document.getElementById('list-container').innerHTML = "<p class='text-center py-10 text-red-500'>Semua server penuh. Coba ganti WiFi/Data.</p>";
        }

        function renderList(list) {
            const container = document.getElementById('list-container');
            container.innerHTML = list.map((song, i) => `
                <div onclick="playSong(${i})" class="flex items-center gap-3 p-2 hover:bg-zinc-900 rounded-lg cursor-pointer transition">
                    <img src="${song.thumbnail || song.cover}" class="w-12 h-12 rounded object-cover bg-zinc-800">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate">${song.title}</div>
                        <div class="text-[10px] text-zinc-500 uppercase tracking-wider truncate">${song.uploaderName || song.artist}</div>
                    </div>
                </div>
            `).join('');
        }

        async function playSong(index) {
            currentIndex = index;
            const song = currentPlaylist[index];
            
            document.getElementById('player-bar').classList.remove('hidden');
            document.getElementById('song-title').innerText = song.title;
            document.getElementById('artist-name').innerText = song.uploaderName || song.artist;
            document.getElementById('cover-art').src = song.thumbnail || song.cover;
            document.getElementById('modal-title').innerText = song.title;
            document.getElementById('modal-artist').innerText = song.uploaderName || song.artist;
            document.getElementById('modal-cover').src = song.thumbnail || song.cover;

            if (currentTab === 'offline') {
                audio.src = URL.createObjectURL(song.blob);
                audio.play();
            } else {
                // Cari stream link (juga pake retry)
                let streamFound = false;
                for (let base of instances) {
                    try {
                        const sRes = await fetch(`${base}/streams/${song.url.split('v=')[1]}`, { signal: AbortSignal.timeout(5000) });
                        const sData = await sRes.json();
                        const stream = sData.audioStreams.find(s => s.format === 'M4A') || sData.audioStreams[0];
                        audio.src = stream.url;
                        audio.play();
                        streamFound = true;
                        currentInstance = base;
                        break;
                    } catch (e) {}
                }
                if(!streamFound) alert("Gagal memuat suara lagu.");
            }
            updateMedia(song);
        }

        // Control Dasar
        function togglePlay(e) { if(e) e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); }
        function nextSong(e) { if(e) e.stopPropagation(); currentIndex = (currentIndex + 1) % currentPlaylist.length; playSong(currentIndex); }
        function prevSong(e) { if(e) e.stopPropagation(); currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length; playSong(currentIndex); }

        audio.onplay = audio.onpause = () => {
            const icons = [document.getElementById('mini-play-icon'), document.getElementById('modal-play-icon')];
            const path = audio.paused ? 'M240,128a15.89,15.89,0,0,1-8.16,13.93l-176,101A15.91,15.91,0,0,1,32,229V27a15.91,15.91,0,0,1,23.84-13.93l176,101A15.89,15.89,0,0,1,240,128Z' : 'M208,48V208a16,16,0,0,1-32,0V48a16,16,0,0,1,32,0ZM80,32A16,16,0,0,0,64,48V208a16,16,0,0,0,32,0V48A16,16,0,0,0,80,32Z';
            icons.forEach(i => i.innerHTML = `<path d="${path}"></path>`);
        };

        // Modal Logic
        function openPlayerModal() { 
            const m = document.getElementById('player-modal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('translate-y-full'), 10);
        }
        function closePlayerModal() {
            const m = document.getElementById('player-modal');
            m.classList.add('translate-y-full');
            setTimeout(() => m.classList.add('hidden'), 500);
        }

        // Progress
        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('mini-progress').style.width = p + '%';
            document.getElementById('modal-seek').value = p;
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        };
        document.getElementById('modal-seek').oninput = (e) => audio.currentTime = (e.target.value / 100) * audio.duration;
        function formatTime(s) { const m=Math.floor(s/60); const sec=Math.floor(s%60); return `${m}:${sec < 10 ? '0'+sec : sec}`; }

        // Download
        async function downloadSong(e) {
            e.stopPropagation();
            const song = currentPlaylist[currentIndex];
            if(currentTab === 'offline') return;
            try {
                const res = await fetch(audio.src);
                const blob = await res.blob();
                await db.songs.put({ id: song.url, title: song.title, artist: song.uploaderName, cover: song.thumbnail, blob: blob });
                alert("Berhasil disimpan offline!");
            } catch (e) { alert("Gagal download."); }
        }

        async function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-online').className = tab === 'online' ? "py-4 px-6 active-tab" : "py-4 px-6";
            document.getElementById('tab-offline').className = tab === 'offline' ? "py-4 px-6 active-tab" : "py-4 px-6";
            if(tab === 'offline') {
                currentPlaylist = await db.songs.toArray();
                renderList(currentPlaylist);
            } else {
                document.getElementById('list-container').innerHTML = "";
            }
        }

        function updateMedia(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title, artist: song.uploaderName || song.artist,
                    artwork: [{ src: song.thumbnail || song.cover, sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
            }
        }
        audio.onended = () => nextSong();
    </script>
</body>
</html>
